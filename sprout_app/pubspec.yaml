name: sprout
description: "Watch your money grow and for those who want to reach their goals quickly."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  connectivity_plus: ^6.1.1
  equatable: ^2.0.7
  fl_chart: ^0.70.2
  flutter_bloc: ^9.1.1
  get_it: ^8.0.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.20.2
  supabase_flutter: ^2.8.4
  uuid: ^4.5.1
  bloc_concurrency: ^0.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/config/development.json
    - assets/config/production.json
